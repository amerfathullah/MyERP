<div class="table-responsive">
    <table class="table table-hover w-100">
    <thead>
      <tr>
        <th style="width: 50px;"></th>
      </tr>
    </thead>
    <tbody>
      @for (row of dataSource; track $index ?? $index) {
        <tr>
          <td></td>
        </tr>
      }
    </tbody>
  </table>
</div>

<button class="btn btn-outline-primary btn-sm mt-3" type="button" (click)="addRow()">
  <i class="fa fa-plus me-1"></i><i class="fa fa-plus me-1"></i>Add Row</button>
