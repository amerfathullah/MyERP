<div class="overflow-x-auto">
  <table mat-table [dataSource]="dataSource" class="w-full">
    @for (col of columns; track col.field) {
      <ng-container [matColumnDef]="col.field">
        <th mat-header-cell *matHeaderCellDef>{{ col.label }}</th>
        <td mat-cell *matCellDef="let row; let i = index" [formGroup]="row">
          <mat-form-field appearance="outline" class="w-full !text-sm" subscriptSizing="dynamic">
            <input matInput
              [formControlName]="col.field"
              [type]="col.type === 'number' ? 'number' : 'text'" />
          </mat-form-field>
        </td>
      </ng-container>
    }

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="w-12"></th>
      <td mat-cell *matCellDef="let row; let i = index">
        <button mat-icon-button color="warn" (click)="removeRow(i)" type="button">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>

<button mat-stroked-button class="mt-3" type="button" (click)="addRow()">
  <mat-icon>add</mat-icon>
  Add Row
</button>
