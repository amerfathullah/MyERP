<div class="table-responsive">
  <table mat-table [dataSource]="dataSource" class="w-100">
    @for (col of columns; track col.field) {
      <ng-container [matColumnDef]="col.field">
        <th mat-header-cell *matHeaderCellDef>{{ col.label }}</th>
        <td mat-cell *matCellDef="let row; let i = index" [formGroup]="row">
          <input class="form-control form-control-sm"
            [formControlName]="col.field"
            [type]="col.type === 'number' ? 'number' : 'text'" />
        </td>
      </ng-container>
    }

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef style="width: 50px;"></th>
      <td mat-cell *matCellDef="let row; let i = index">
        <button class="btn btn-sm btn-outline-danger" (click)="removeRow(i)" type="button" aria-label="Remove row">
          <i class="fa fa-trash"></i>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>

<button class="btn btn-outline-primary btn-sm mt-3" type="button" (click)="addRow()">
  <i class="fa fa-plus me-1"></i>
  Add Row
</button>
