<button class="btn btn-link position-relative p-2" data-bs-toggle="dropdown" aria-expanded="false">
  <i class="fa fa-bell fs-5"></i>
  @if (unreadCount() > 0) {
    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
      {{ unreadCount() }}
    </span>
  }
</button>

<ul class="dropdown-menu dropdown-menu-end">
  <li class="px-3 py-2 d-flex justify-content-between align-items-center border-bottom">
    <span class="fw-medium small">{{ '::Notifications' | abpLocalization }}</span>
    @if (unreadCount() > 0) {
      <button class="btn btn-link btn-sm p-0 small" (click)="markAllAsRead(); $event.stopPropagation()"><i class="fa fa-check-double me-1"></i>{{ '::MarkAllRead' | abpLocalization }}</button>
    }
  </li>

  @if (notifications().length === 0) {
    <li class="px-3 py-3 text-center text-muted small">
      {{ '::NoNotifications' | abpLocalization }}
    </li>
  } @else {
    @for (notif of notifications(); track notif.id) {
      <li>
        <button class="dropdown-item h-auto py-2"
          [class.bg-light]="!notif.isRead"
          (click)="markAsRead(notif.id!)">
          <div class="d-flex align-items-start gap-2">
            <i class="fa" [class]="getSeverityColor(notif.severity!) + ' ' + getSeverityIcon(notif.severity!)"></i>
            <div class="flex-grow-1 overflow-hidden">
              <p class="small fw-medium text-truncate mb-0" [class.fw-bold]="!notif.isRead">{{ notif.subject }}</p>
              <p class="small text-muted mb-0">{{ notif.creationTime | date:'short' }}</p>
            </div>
          </div>
        </button>
      </li>
    }
  }

  <li><hr class="dropdown-divider" /></li>
  <li>
    <a class="dropdown-item text-center" routerLink="/notifications">
      <span class="small text-primary">{{ '::ViewAll' | abpLocalization }}</span>
    </a>
  </li>
</ul>
