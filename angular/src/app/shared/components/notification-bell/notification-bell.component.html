<button mat-icon-button [matMenuTriggerFor]="notifMenu"
  [matBadge]="unreadCount() > 0 ? unreadCount() : null"
  matBadgeColor="warn" matBadgeSize="small">
  <mat-icon>notifications</mat-icon>
</button>

<mat-menu #notifMenu="matMenu" class="notification-menu">
  <div class="px-3 py-2 d-flex justify-content-between align-items-center border-bottom">
    <span class="fw-medium small">Notifications</span>
    @if (unreadCount() > 0) {
      <button mat-button color="primary" class="small" (click)="markAllAsRead(); $event.stopPropagation()">
        Mark all read
      </button>
    }
  </div>

  @if (notifications().length === 0) {
    <div class="px-3 py-3 text-center text-muted small">
      No notifications
    </div>
  } @else {
    @for (notif of notifications(); track notif.id) {
      <button mat-menu-item class="h-auto py-2"
        [class.bg-light]="!notif.isRead"
        (click)="markAsRead(notif.id!)">
        <div class="d-flex align-items-start gap-2">
          <mat-icon [class]="getSeverityColor(notif.severity!)">{{ getSeverityIcon(notif.severity!) }}</mat-icon>
          <div class="flex-grow-1 overflow-hidden">
            <p class="small fw-medium text-truncate" [class.fw-bold]="!notif.isRead">{{ notif.subject }}</p>
            <p class="small text-muted">{{ notif.creationTime | date:'short' }}</p>
          </div>
        </div>
      </button>
    }
  }

  <mat-divider></mat-divider>
  <button mat-menu-item routerLink="/notifications" class="text-center">
    <span class="small text-primary">View all</span>
  </button>
</mat-menu>
