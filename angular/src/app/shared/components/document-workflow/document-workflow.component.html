<div class="d-flex align-items-center gap-2">
  @if (currentStatus) {
    <app-status-badge [status]="currentStatus" />
  }

  @for (action of actions; track action.name) {
    <button class="btn btn-sm" [class]="'btn-outline-' + action.color"
      (click)="actionClicked.emit(action.name)">
      <i class="me-1" [ngClass]="'fa fa-' + action.icon"></i>
      {{ action.label }}
    </button>
  }
</div>
