<div class="d-flex align-items-center gap-2">
  <app-status-badge [status]="currentStatus" />

  @for (action of availableActions; track action.name) {
    <button class="btn btn-sm btn-outline-primary"
      (click)="actionTriggered.emit(action.name)">
      <i class="me-1" [ngClass]="'fa fa-' + action.icon"></i>
      {{ action.label }}
    </button>
  }
</div>
