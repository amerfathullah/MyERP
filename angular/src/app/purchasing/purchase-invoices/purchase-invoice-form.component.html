<abp-page [title]="'Create Purchase Invoice'">
  <form [formGroup]="form" (ngSubmit)="save()">
    <!-- Header fields -->
    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="fa fa-file-invoice me-2"></i>Invoice Details</h5>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Invoice Number</label>
            <input type="text" class="form-control" formControlName="invoiceNumber" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Issue Date</label>
            <input type="date" class="form-control" formControlName="issueDate" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Currency</label>
            <select class="form-select" formControlName="currency">
              <option value="MYR">MYR</option>
              <option value="USD">USD</option>
              <option value="SGD">SGD</option>
            </select>
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Supplier</label>
            <input type="text" class="form-control" formControlName="supplierName" placeholder="Search supplier..." />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Supplier TIN</label>
            <input type="text" class="form-control" formControlName="supplierTin" />
          </div>
        </div>
      </div>
    </div>

    <!-- Line items -->
    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="fa fa-list me-2"></i>Invoice Items</h5>
      </div>
      <div class="card-body">
        <app-invoice-item-grid [items]="items" />
      </div>
    </div>

    <!-- Totals -->
    <div class="card mb-4">
      <div class="card-body">
        <div class="d-flex flex-column align-items-end gap-2">
          <div class="d-flex justify-content-between" style="width: 260px">
            <small class="text-muted">Net Total</small>
            <span class="font-monospace fw-medium">{{ calcResult.netTotal | number:'1.2-2' }}</span>
          </div>
          @for (tax of calcResult.taxLines; track tax.taxName) {
            <div class="d-flex justify-content-between" style="width: 260px">
              <small class="text-muted">{{ tax.taxName }} ({{ tax.rate }}%)</small>
              <span class="font-monospace">{{ tax.taxAmount | number:'1.2-2' }}</span>
            </div>
          }
          <div class="d-flex justify-content-between border-top pt-2 mt-2" style="width: 260px">
            <span class="fw-semibold">Grand Total</span>
            <span class="font-monospace fw-bold fs-5">{{ calcResult.grandTotal | number:'1.2-2' }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
        <i class="fa fa-times me-1"></i> Cancel
      </button>
      <button type="button" class="btn btn-outline-secondary" (click)="recalculate()">
        <i class="fa fa-calculator me-1"></i> Recalculate
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
        <i class="fa fa-save me-1"></i> Save as Draft
      </button>
    </div>
  </form>
</abp-page>
