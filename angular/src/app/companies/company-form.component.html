<abp-page [title]="isEditMode ? ('::EditCompany' | abpLocalization) : ('::NewCompany' | abpLocalization)">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="fa fa-building me-2"></i>{{ '::CompanyInformation' | abpLocalization }}</h5>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::CompanyName' | abpLocalization }} <span class="text-danger">*</span></label>
            <input type="text" class="form-control" formControlName="name"
              [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched" />
            @if (form.get('name')?.errors?.['required'] && form.get('name')?.touched) {
              <div class="invalid-feedback">{{ '::Required' | abpLocalization }}</div>
            }
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::ShortName' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="shortName" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::TinTaxId' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="taxId" [placeholder]="'::Placeholder:TaxIdExample' | abpLocalization" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::RegistrationNoSsm' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="registrationNumber" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::SstRegistrationNo' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="sstRegistrationNumber" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::MsicCode' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="msicCode" />
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="fa fa-address-book me-2"></i>{{ '::ContactAndAddress' | abpLocalization }}</h5>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::Phone' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="phone" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::Email' | abpLocalization }}</label>
            <input type="email" class="form-control" formControlName="email" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::Website' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="website" />
          </div>
          <div class="col-12 col-md-8 mb-3">
            <label class="form-label">{{ '::Address' | abpLocalization }}</label>
            <textarea class="form-control" formControlName="address" rows="2"></textarea>
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::City' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="city" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::State' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="state" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::PostalCode' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="postalCode" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::Country' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="country" />
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="fa fa-gear me-2"></i>{{ '::Settings' | abpLocalization }}</h5>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::Currency' | abpLocalization }}</label>
            <select class="form-select" formControlName="currencyCode">
              <option value="MYR">MYR — Malaysian Ringgit</option>
              <option value="USD">USD — US Dollar</option>
              <option value="SGD">SGD — Singapore Dollar</option>
            </select>
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ '::FiscalYearStart' | abpLocalization }}</label>
            <select class="form-select" formControlName="fiscalYearStartMonth">
              @for (m of months; track m.value) {
                <option [value]="m.value">{{ m.label }}</option>
              }
            </select>
          </div>
          <div class="col-12 col-md-4 mb-3 d-flex align-items-end">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="isActive" formControlName="isActive" />
              <label class="form-check-label" for="isActive">{{ '::Active' | abpLocalization }}</label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
        <i class="fa fa-times me-1"></i>{{ '::Cancel' | abpLocalization }}
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
        <i class="fa fa-save me-1"></i>{{ '::Save' | abpLocalization }}
      </button>
    </div>
  </form>
</abp-page>
