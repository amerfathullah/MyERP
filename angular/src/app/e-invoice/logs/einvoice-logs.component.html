<abp-page [title]="'e-Invoice Submission Logs'">
  <div class="position-relative">
    @if (isLoading) {
      <div class="d-flex justify-content-center py-3"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div></div>
    }
    <div class="card">
      <div class="card-header"><h5 class="card-title mb-0">Submission Logs</h5></div>
      <div class="card-body pt-3">
        @if (submissions.length === 0) {
          <p class="text-center text-muted py-5">No submissions yet.</p>
        } @else {
          <div class="table-responsive">
            <table mat-table [dataSource]="submissions" class="w-100">
              <ng-container matColumnDef="invoiceNumber">
                <th mat-header-cell *matHeaderCellDef>Invoice #</th>
                <td mat-cell *matCellDef="let log" class="fw-medium">{{ log.invoiceNumber }}</td>
              </ng-container>

              <ng-container matColumnDef="documentType">
                <th mat-header-cell *matHeaderCellDef>Type</th>
                <td mat-cell *matCellDef="let log">{{ log.documentType }}</td>
              </ng-container>

              <ng-container matColumnDef="lhdnUuid">
                <th mat-header-cell *matHeaderCellDef>LHDN UUID</th>
                <td mat-cell *matCellDef="let log" class="font-monospace small">{{ log.lhdnUuid }}</td>
              </ng-container>

              <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef>Status</th>
                <td mat-cell *matCellDef="let log">
                  <app-lhdn-status-badge [status]="log.status" />
                </td>
              </ng-container>

              <ng-container matColumnDef="submittedAt">
                <th mat-header-cell *matHeaderCellDef>Submitted</th>
                <td mat-cell *matCellDef="let log">{{ log.submittedAt | date:'dd/MM/yyyy HH:mm' }}</td>
              </ng-container>

              <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef></th>
                <td mat-cell *matCellDef="let log">
                  <button class="btn btn-sm btn-link p-1" (click)="refreshStatus(log.id)" title="Refresh status">
                    <i class="fa fa-sync"></i>
                  </button>
                </td>
              </ng-container>

              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            </table>
          </div>
        }
      </div>
    </div>
  </div>
</abp-page>
