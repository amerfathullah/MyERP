<abp-page [title]="'e-Invoice Submission Logs'">
  <div class="relative">
    @if (isLoading) { <app-loading-overlay /> }
    <mat-card>
      <mat-card-header class="px-4 pt-4">
        <mat-card-title>Submission Logs</mat-card-title>
      </mat-card-header>
      <mat-card-content class="pt-4">
        @if (logs.length === 0) {
          <p class="text-center text-gray-500 py-8">No submissions yet.</p>
        } @else {
          <table mat-table [dataSource]="logs" class="w-full">
            <ng-container matColumnDef="invoiceNumber">
              <th mat-header-cell *matHeaderCellDef>Invoice #</th>
              <td mat-cell *matCellDef="let log" class="font-medium">{{ log.invoiceNumber }}</td>
            </ng-container>

            <ng-container matColumnDef="documentType">
              <th mat-header-cell *matHeaderCellDef>Type</th>
              <td mat-cell *matCellDef="let log">{{ log.documentType }}</td>
            </ng-container>

            <ng-container matColumnDef="lhdnUuid">
              <th mat-header-cell *matHeaderCellDef>LHDN UUID</th>
              <td mat-cell *matCellDef="let log" class="font-mono text-xs">{{ log.lhdnUuid }}</td>
            </ng-container>

            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef>Status</th>
              <td mat-cell *matCellDef="let log">
                <app-lhdn-status-badge [status]="log.status" />
              </td>
            </ng-container>

            <ng-container matColumnDef="submittedAt">
              <th mat-header-cell *matHeaderCellDef>Submitted</th>
              <td mat-cell *matCellDef="let log">{{ log.submittedAt | date:'dd/MM/yyyy HH:mm' }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef></th>
              <td mat-cell *matCellDef="let log">
                <button mat-icon-button (click)="refreshStatus(log.id)" matTooltip="Refresh status">
                  <mat-icon>refresh</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        }
      </mat-card-content>
    </mat-card>
  </div>
</abp-page>
