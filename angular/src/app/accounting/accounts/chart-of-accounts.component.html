<abp-page [title]="'Chart of Accounts'">
  <div class="card">
    <div class="card-header d-flex align-items-center justify-content-between">
      <h5 class="card-title mb-0">Chart of Accounts</h5>
      <button class="btn btn-primary" (click)="addAccount()">
        <i class="fa fa-plus"></i>
        New Account
      </button>
    </div>

    <div class="card-body pt-3">
      <mat-tree [dataSource]="dataSource" [treeControl]="treeControl" class="w-100">
        <!-- Leaf node -->
        <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
          <button mat-icon-button disabled></button>
          <i class="fa fa-file-alt text-muted me-2"></i>
          <span class="small font-monospace text-muted me-3">{{ node.accountCode }}</span>
          <span class="small">{{ node.accountName }}</span>
          @if (node.balance !== undefined) {
            <span class="ms-auto font-monospace small text-muted">
              {{ node.balance | number:'1.2-2' }}
            </span>
          }
        </mat-tree-node>

        <!-- Group node -->
        <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild">
          <div class="mat-tree-node">
            <button mat-icon-button matTreeNodeToggle>
              <i class="fa" [class]="treeControl.isExpanded(node) ? 'fa-chevron-down' : 'fa-chevron-right'"></i>
            </button>
            <i class="fa me-2 text-primary">{{ getTypeIcon(node.accountType) }}</i>
            <span class="small font-monospace text-muted me-3">{{ node.accountCode }}</span>
            <span class="small fw-semibold">{{ node.accountName }}</span>
          </div>
          <div [class.hidden]="!treeControl.isExpanded(node)" role="group">
            <ng-container matTreeNodeOutlet></ng-container>
          </div>
        </mat-nested-tree-node>
      </mat-tree>
    </div>
  </div>
</abp-page>
