<abp-page [title]="'Chart of Accounts'">
  <mat-card>
    <mat-card-header class="flex items-center justify-between px-4 pt-4">
      <mat-card-title>Chart of Accounts</mat-card-title>
      <button mat-flat-button color="primary" (click)="addAccount()">
        <mat-icon>add</mat-icon>
        New Account
      </button>
    </mat-card-header>

    <mat-card-content class="pt-4">
      <mat-tree [dataSource]="dataSource" [treeControl]="treeControl" class="w-full">
        <!-- Leaf node -->
        <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
          <button mat-icon-button disabled></button>
          <mat-icon class="text-gray-400 mr-2">description</mat-icon>
          <span class="text-sm font-mono text-gray-500 mr-3">{{ node.accountCode }}</span>
          <span class="text-sm">{{ node.accountName }}</span>
          @if (node.balance !== undefined) {
            <span class="ml-auto font-mono text-sm text-gray-600">
              {{ node.balance | number:'1.2-2' }}
            </span>
          }
        </mat-tree-node>

        <!-- Group node -->
        <mat-nested-tree-node *matTreeNodeDef="let node; when: hasChild">
          <div class="mat-tree-node">
            <button mat-icon-button matTreeNodeToggle>
              <mat-icon>
                {{ treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right' }}
              </mat-icon>
            </button>
            <mat-icon class="mr-2" [class]="'text-blue-500'">{{ getTypeIcon(node.accountType) }}</mat-icon>
            <span class="text-sm font-mono text-gray-500 mr-3">{{ node.accountCode }}</span>
            <span class="text-sm font-semibold">{{ node.accountName }}</span>
          </div>
          <div [class.hidden]="!treeControl.isExpanded(node)" role="group">
            <ng-container matTreeNodeOutlet></ng-container>
          </div>
        </mat-nested-tree-node>
      </mat-tree>
    </mat-card-content>
  </mat-card>
</abp-page>
