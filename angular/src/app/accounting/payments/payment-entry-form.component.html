<abp-page [title]="'Payment Entry'">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="fa fa-money-bill-wave me-2"></i>Payment Entry</h5>
      </div>
      <div class="card-body">
        <div class="mb-3">
          <div class="btn-group" role="group">
            <input type="radio" class="btn-check" formControlName="paymentType" value="Receive" id="ptReceive" />
            <label class="btn btn-outline-primary" for="ptReceive">Receive</label>
            <input type="radio" class="btn-check" formControlName="paymentType" value="Pay" id="ptPay" />
            <label class="btn btn-outline-primary" for="ptPay">Pay</label>
            <input type="radio" class="btn-check" formControlName="paymentType" value="InternalTransfer" id="ptTransfer" />
            <label class="btn btn-outline-primary" for="ptTransfer">Internal Transfer</label>
          </div>
        </div>

        <div class="row">
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Payment Date</label>
            <input type="date" class="form-control" formControlName="paymentDate" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Party Type</label>
            <select class="form-select" formControlName="partyType">
              <option value="Customer">Customer</option>
              <option value="Supplier">Supplier</option>
            </select>
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Party Name</label>
            <input type="text" class="form-control" formControlName="partyName" placeholder="Search..." />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Paid From Account</label>
            <input type="text" class="form-control" formControlName="paidFromAccount" placeholder="e.g., Accounts Receivable" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Paid To Account</label>
            <input type="text" class="form-control" formControlName="paidToAccount" placeholder="e.g., Cash and Bank" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Amount (MYR)</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fa fa-money-bill"></i></span>
              <input type="number" class="form-control" formControlName="amount" />
            </div>
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Reference No.</label>
            <input type="text" class="form-control" formControlName="reference" />
          </div>
          <div class="col-12 col-md-8 mb-3">
            <label class="form-label">Remarks</label>
            <input type="text" class="form-control" formControlName="remarks" />
          </div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
        <i class="fa fa-times me-1"></i> Cancel
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
        <i class="fa fa-save me-1"></i> Save Payment
      </button>
    </div>
  </form>
</abp-page>
