<abp-page [title]="'Payment Entry'">
  <form [formGroup]="form" (ngSubmit)="save()">
    <mat-card class="mb-6">
      <mat-card-content>
        <div class="mb-4">
          <mat-radio-group formControlName="paymentType" class="flex gap-6">
            <mat-radio-button value="Receive">Receive</mat-radio-button>
            <mat-radio-button value="Pay">Pay</mat-radio-button>
            <mat-radio-button value="InternalTransfer">Internal Transfer</mat-radio-button>
          </mat-radio-group>
        </div>

        <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
          <mat-form-field appearance="outline">
            <mat-label>Payment Date</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="paymentDate" />
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Party Type</mat-label>
            <mat-select formControlName="partyType">
              <mat-option value="Customer">Customer</mat-option>
              <mat-option value="Supplier">Supplier</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Party Name</mat-label>
            <input matInput formControlName="partyName" placeholder="Search..." />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Paid From Account</mat-label>
            <input matInput formControlName="paidFromAccount" placeholder="e.g., Accounts Receivable" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Paid To Account</mat-label>
            <input matInput formControlName="paidToAccount" placeholder="e.g., Cash and Bank" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Amount (MYR)</mat-label>
            <input matInput type="number" formControlName="amount" />
            <mat-icon matPrefix>payments</mat-icon>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Reference No.</mat-label>
            <input matInput formControlName="reference" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="md:col-span-2">
            <mat-label>Remarks</mat-label>
            <input matInput formControlName="remarks" />
          </mat-form-field>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Actions -->
    <div class="flex gap-3 justify-end">
      <button mat-stroked-button type="button" (click)="cancel()">
        <mat-icon>close</mat-icon> Cancel
      </button>
      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid">
        <mat-icon>save</mat-icon> Save Payment
      </button>
    </div>
  </form>
</abp-page>
