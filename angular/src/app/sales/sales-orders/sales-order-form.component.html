<abp-page [title]="'New Sales Order'">
  <form [formGroup]="form" (ngSubmit)="save()" (appSaveShortcut)="save()">
    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="fa fa-shopping-cart me-2"></i>Sales Order Details</h5>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">SO #</label>
            <input type="text" class="form-control" formControlName="orderNumber" [class.is-invalid]="form.get('orderNumber')?.invalid && form.get('orderNumber')?.touched" [placeholder]="'::Placeholder:AutoGenerated' | abpLocalization" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Order Date</label>
            <input type="date" class="form-control" formControlName="orderDate" [class.is-invalid]="form.get('orderDate')?.invalid && form.get('orderDate')?.touched" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Delivery Date</label>
            <input type="date" class="form-control" formControlName="deliveryDate" [class.is-invalid]="form.get('deliveryDate')?.invalid && form.get('deliveryDate')?.touched" />
          </div>
          <div class="col-12 col-md-8 mb-3">
            <label class="form-label">Customer</label>
            <select class="form-select" formControlName="customerId" [class.is-invalid]="form.get('customerId')?.invalid && form.get('customerId')?.touched">
              <option value="">— Select Customer —</option>
              @for (c of customers(); track c.id) {
                <option [value]="c.id">{{ c.name }}</option>
              }
            </select>
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">{{ 'Warehouse' | abpLocalization }}</label>
            <select class="form-select" formControlName="warehouseId">
              <option value="">— {{ 'SelectWarehouse' | abpLocalization }} —</option>
              @for (w of warehouses(); track w.id) {
                <option [value]="w.id">{{ w.name }}</option>
              }
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="fa fa-list me-2"></i>Items</h5>
      </div>
      <div class="card-body">
        <app-invoice-item-grid [items]="items" [availableItems]="availableItems()" />

        @if (items.length > 0) {
          <div class="mt-2 d-flex flex-wrap gap-2">
            @for (ctrl of items.controls; track $index) {
              @if (ctrl.get('itemId')?.value) {
                <app-stock-availability
                  [itemId]="ctrl.get('itemId')!.value"
                  [requiredQty]="ctrl.get('qty')?.value || ctrl.get('quantity')?.value || 0"
                />
              }
            }
          </div>
        }
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <div class="d-flex flex-column align-items-end gap-1">
          <div class="d-flex justify-content-between" style="width: 220px">
            <small class="text-muted">Net Total</small>
            <span class="font-monospace">{{ calcResult.netTotal | number:'1.2-2' }}</span>
          </div>
          <div class="d-flex justify-content-between border-top pt-2 mt-1" style="width: 220px">
            <span class="fw-semibold">Grand Total</span>
            <span class="font-monospace fw-bold">{{ calcResult.grandTotal | number:'1.2-2' }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-outline-secondary" (click)="cancel()"><i class="fa fa-times me-1"></i>Cancel</button>
      <button type="button" class="btn btn-outline-secondary" (click)="recalculate()"><i class="fa fa-calculator me-1"></i> Recalculate</button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
        <i class="fa fa-save me-1"></i> Save Draft
      </button>
    </div>
  </form>
</abp-page>
