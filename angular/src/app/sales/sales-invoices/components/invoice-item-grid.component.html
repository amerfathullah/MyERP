<div class="overflow-x-auto">
  <table mat-table [dataSource]="dataSource" class="w-full">
    <ng-container matColumnDef="itemName">
      <th mat-header-cell *matHeaderCellDef>Item</th>
      <td mat-cell *matCellDef="let row" [formGroup]="row">
        <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
          <input matInput formControlName="itemName" placeholder="Item name" />
        </mat-form-field>
      </td>
    </ng-container>

    <ng-container matColumnDef="qty">
      <th mat-header-cell *matHeaderCellDef class="w-24">Qty</th>
      <td mat-cell *matCellDef="let row; let i = index" [formGroup]="row">
        <mat-form-field appearance="outline" class="w-24" subscriptSizing="dynamic">
          <input matInput type="number" formControlName="qty" (change)="recalculateRow(i)" />
        </mat-form-field>
      </td>
    </ng-container>

    <ng-container matColumnDef="rate">
      <th mat-header-cell *matHeaderCellDef class="w-28">Rate</th>
      <td mat-cell *matCellDef="let row; let i = index" [formGroup]="row">
        <mat-form-field appearance="outline" class="w-28" subscriptSizing="dynamic">
          <input matInput type="number" formControlName="rate" (change)="recalculateRow(i)" />
        </mat-form-field>
      </td>
    </ng-container>

    <ng-container matColumnDef="discountPercent">
      <th mat-header-cell *matHeaderCellDef class="w-24">Disc %</th>
      <td mat-cell *matCellDef="let row; let i = index" [formGroup]="row">
        <mat-form-field appearance="outline" class="w-24" subscriptSizing="dynamic">
          <input matInput type="number" formControlName="discountPercent" (change)="recalculateRow(i)" />
        </mat-form-field>
      </td>
    </ng-container>

    <ng-container matColumnDef="amount">
      <th mat-header-cell *matHeaderCellDef class="w-28">Amount</th>
      <td mat-cell *matCellDef="let row" [formGroup]="row">
        <span class="font-mono text-sm">{{ row.get('amount')?.value | number:'1.2-2' }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef class="w-12"></th>
      <td mat-cell *matCellDef="let row; let i = index">
        <button mat-icon-button color="warn" (click)="removeRow(i)" type="button">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>

<button mat-stroked-button class="mt-3" type="button" (click)="addRow()">
  <mat-icon>add</mat-icon>
  Add Item
</button>
