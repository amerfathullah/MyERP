<div class="table-responsive">
    <table class="table table-hover w-100">
    <thead>
      <tr>
        <th style="min-width: 150px;">Item</th>
        <th style="width: 80px;">Qty</th>
        <th style="width: 100px;">Rate</th>
        <th style="width: 80px;">Disc %</th>
        <th style="width: 100px;">Amount</th>
        <th style="width: 50px;"></th>
      </tr>
    </thead>
    <tbody>
      @for (row of dataSource; track $index) {
        <tr [formGroup]="row">
          <td>
            @if (availableItems.length > 0) {
              <select class="form-select form-select-sm" formControlName="itemId" (change)="onItemSelected($index)">
                <option value="">— Select —</option>
                @for (item of availableItems; track item.id) {
                  <option [value]="item.id">{{ item.itemCode ?? item.itemName }}</option>
                }
              </select>
            } @else {
              <input class="form-control form-control-sm" formControlName="itemName" [placeholder]="'::Placeholder:ItemName' | abpLocalization" />
            }
          </td>
          <td><input type="number" class="form-control form-control-sm" formControlName="qty" (change)="recalculateRow($index)" min="0.01" step="1" /></td>
          <td><input type="number" class="form-control form-control-sm" formControlName="rate" (change)="recalculateRow($index)" min="0" step="0.01" /></td>
          <td><input type="number" class="form-control form-control-sm" formControlName="discountPercent" (change)="recalculateRow($index)" min="0" max="100" step="1" /></td>
          <td><span class="font-monospace small">{{ row.get('amount')?.value | number:'1.2-2' }}</span></td>
          <td>
            <button type="button" class="btn btn-sm btn-outline-danger" (click)="removeRow($index)">
              <i class="fa fa-trash"></i>
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>

<button class="btn btn-outline-primary btn-sm mt-3" type="button" (click)="addRow()">
  <i class="fa fa-plus me-1"></i>{{ '::AddItem' | abpLocalization }}</button>
