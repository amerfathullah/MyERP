<div class="table-responsive">
  <table mat-table [dataSource]="dataSource" class="w-100">
    <ng-container matColumnDef="itemName">
      <th mat-header-cell *matHeaderCellDef style="min-width: 150px;">Item</th>
      <td mat-cell *matCellDef="let row" [formGroup]="row">
        <input class="form-control form-control-sm" formControlName="itemName" placeholder="Item name" />
      </td>
    </ng-container>

    <ng-container matColumnDef="qty">
      <th mat-header-cell *matHeaderCellDef style="width: 80px;">Qty</th>
      <td mat-cell *matCellDef="let row; let i = index" [formGroup]="row">
        <input class="form-control form-control-sm" type="number" formControlName="qty" (change)="recalculateRow(i)" />
      </td>
    </ng-container>

    <ng-container matColumnDef="rate">
      <th mat-header-cell *matHeaderCellDef style="width: 100px;">Rate</th>
      <td mat-cell *matCellDef="let row; let i = index" [formGroup]="row">
        <input class="form-control form-control-sm" type="number" formControlName="rate" (change)="recalculateRow(i)" />
      </td>
    </ng-container>

    <ng-container matColumnDef="discountPercent">
      <th mat-header-cell *matHeaderCellDef style="width: 80px;">Disc %</th>
      <td mat-cell *matCellDef="let row; let i = index" [formGroup]="row">
        <input class="form-control form-control-sm" type="number" formControlName="discountPercent" (change)="recalculateRow(i)" />
      </td>
    </ng-container>

    <ng-container matColumnDef="amount">
      <th mat-header-cell *matHeaderCellDef style="width: 100px;">Amount</th>
      <td mat-cell *matCellDef="let row" [formGroup]="row">
        <span class="font-monospace small">{{ row.get('amount')?.value | number:'1.2-2' }}</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef style="width: 50px;"></th>
      <td mat-cell *matCellDef="let row; let i = index">
        <button class="btn btn-sm btn-outline-danger" (click)="removeRow(i)" type="button" aria-label="Remove item">
          <i class="fa fa-trash"></i>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>

<button class="btn btn-outline-primary btn-sm mt-3" type="button" (click)="addRow()">
  <i class="fa fa-plus me-1"></i><i class="fa fa-plus me-1"></i>Add Item</button>
