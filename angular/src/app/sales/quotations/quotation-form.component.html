<abp-page [title]="'New Quotation'">
  <form [formGroup]="form" (ngSubmit)="save()" (appSaveShortcut)="save()">
    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="fa fa-file-alt me-2"></i>Quotation Details</h5>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Quotation #</label>
            <input type="text" class="form-control" formControlName="quotationNumber" [class.is-invalid]="form.get('quotationNumber')?.invalid && form.get('quotationNumber')?.touched" [placeholder]="'::Placeholder:AutoGenerated' | abpLocalization" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" formControlName="quotationDate" [class.is-invalid]="form.get('quotationDate')?.invalid && form.get('quotationDate')?.touched" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Valid Until</label>
            <input type="date" class="form-control" formControlName="validUntil" [class.is-invalid]="form.get('validUntil')?.invalid && form.get('validUntil')?.touched" />
          </div>
          <div class="col-12 col-md-8 mb-3">
            <label class="form-label">Customer</label>
            <select class="form-select" formControlName="customerId" [class.is-invalid]="form.get('customerId')?.invalid && form.get('customerId')?.touched">
              <option value="">Select customer...</option>
              @for (c of customers(); track c.id) {
                <option [value]="c.id">{{ c.customerName ?? c.name }}</option>
              }
            </select>
          </div>
        </div>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="fa fa-list me-2"></i>Items</h5>
      </div>
      <div class="card-body">
        <app-invoice-item-grid [items]="items" [availableItems]="availableItems()" />
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-body">
        <div class="d-flex flex-column align-items-end gap-1">
          <div class="d-flex justify-content-between" style="width: 220px">
            <small class="text-muted">Net Total</small>
            <span class="font-monospace">{{ calcResult.netTotal | number:'1.2-2' }}</span>
          </div>
          <div class="d-flex justify-content-between border-top pt-2 mt-1" style="width: 220px">
            <span class="fw-semibold">Grand Total</span>
            <span class="font-monospace fw-bold">{{ calcResult.grandTotal | number:'1.2-2' }}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-outline-secondary" (click)="cancel()"><i class="fa fa-times me-1"></i>Cancel</button>
      <button type="button" class="btn btn-outline-secondary" (click)="recalculate()"><i class="fa fa-calculator me-1"></i> Recalculate</button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
        <i class="fa fa-save me-1"></i> Save Draft
      </button>
    </div>
  </form>
</abp-page>
