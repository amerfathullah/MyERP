<abp-page [title]="isEditMode ? ('::EditDeliveryNote' | abpLocalization) : ('::NewDeliveryNote' | abpLocalization)">
  <mat-card>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="save()" class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <mat-form-field appearance="outline">
          <mat-label>{{ '::Company' | abpLocalization }}</mat-label>
          <input matInput formControlName="companyId" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ '::Customer' | abpLocalization }}</mat-label>
          <input matInput formControlName="customerId" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ '::PostingDate' | abpLocalization }}</mat-label>
          <input matInput type="date" formControlName="postingDate" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ '::SalesOrder' | abpLocalization }}</mat-label>
          <input matInput formControlName="salesOrderId" placeholder="Optional" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>{{ '::Warehouse' | abpLocalization }}</mat-label>
          <input matInput formControlName="warehouseId" />
        </mat-form-field>

        <!-- Line Items -->
        <div class="md:col-span-2">
          <h6 class="font-medium mb-2">{{ '::Items' | abpLocalization }}</h6>
          @for (item of items.controls; track $index; let i = $index) {
            <div [formGroup]="$any(item)" class="grid grid-cols-12 gap-2 mb-2 items-center">
              <mat-form-field appearance="outline" class="col-span-3">
                <input matInput formControlName="itemId" placeholder="Item ID" />
              </mat-form-field>
              <mat-form-field appearance="outline" class="col-span-4">
                <input matInput formControlName="description" placeholder="Description" />
              </mat-form-field>
              <mat-form-field appearance="outline" class="col-span-2">
                <input matInput type="number" formControlName="quantity" placeholder="Qty" />
              </mat-form-field>
              <mat-form-field appearance="outline" class="col-span-2">
                <input matInput formControlName="uom" placeholder="UOM" />
              </mat-form-field>
              <button mat-icon-button color="warn" type="button" (click)="removeItem(i)" class="col-span-1">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          }
          <button mat-stroked-button type="button" (click)="addItemRow()">
            <mat-icon>add</mat-icon> {{ '::AddRow' | abpLocalization }}
          </button>
        </div>

        <div class="md:col-span-2 flex justify-end gap-3 pt-4">
          <button mat-stroked-button type="button" routerLink="/sales/delivery-notes">
            {{ '::Cancel' | abpLocalization }}
          </button>
          <button mat-flat-button color="primary" type="submit">
            <mat-icon>save</mat-icon> {{ '::Save' | abpLocalization }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</abp-page>
