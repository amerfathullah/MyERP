<abp-page [title]="'NewProductionPlan' | abpLocalization">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">{{ 'Company' | abpLocalization }} *</label>
            <input type="text" class="form-control" formControlName="companyId" placeholder="Company ID">
          </div>
          <div class="col-md-6">
            <label class="form-label">{{ 'PostingDate' | abpLocalization }} *</label>
            <input type="date" class="form-control" formControlName="postingDate">
          </div>
        </div>

        <div class="row g-3 mt-2">
          <div class="col-md-4">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="combineItems" formControlName="combineItems">
              <label class="form-check-label" for="combineItems">{{ 'CombineItems' | abpLocalization }}</label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="ignoreOrders" formControlName="ignoreExistingOrderedQty">
              <label class="form-check-label" for="ignoreOrders">{{ 'IgnoreExistingOrders' | abpLocalization }}</label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="minOrder" formControlName="considerMinimumOrderQty">
              <label class="form-check-label" for="minOrder">{{ 'ConsiderMinOrderQty' | abpLocalization }}</label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="safety" formControlName="includeSafetyStock">
              <label class="form-check-label" for="safety">{{ 'IncludeSafetyStock' | abpLocalization }}</label>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="skipSub" formControlName="skipAvailableSubAssemblyItem">
              <label class="form-check-label" for="skipSub">{{ 'SkipAvailableSubAssembly' | abpLocalization }}</label>
            </div>
          </div>
        </div>

        <div class="mt-3">
          <label class="form-label">Notes</label>
          <textarea class="form-control" formControlName="notes" rows="2"></textarea>
        </div>
      </div>
    </div>

    <!-- Items Table -->
    <div class="card mb-3">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span class="fw-bold">{{ 'PlannedItems' | abpLocalization }}</span>
        <button type="button" class="btn btn-sm btn-outline-primary" (click)="addItem()">
          <i class="fa fa-plus me-1"></i>{{ 'AddItem' | abpLocalization }}
        </button>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-sm mb-0">
            <thead>
              <tr>
                <th>Item ID</th>
                <th>{{ 'Item' | abpLocalization }}</th>
                <th>BOM ID</th>
                <th class="text-end">{{ 'PlannedQty' | abpLocalization }}</th>
                <th></th>
              </tr>
            </thead>
            <tbody formArrayName="items">
              @for (item of items.controls; track $index; let i = $index) {
                <tr [formGroupName]="i">
                  <td><input type="text" class="form-control form-control-sm" formControlName="itemId"></td>
                  <td><input type="text" class="form-control form-control-sm" formControlName="itemName"></td>
                  <td><input type="text" class="form-control form-control-sm" formControlName="bomId"></td>
                  <td><input type="number" class="form-control form-control-sm text-end" formControlName="plannedQty" step="0.01"></td>
                  <td>
                    <button type="button" class="btn btn-sm btn-outline-danger" (click)="removeItem(i)">
                      <i class="fa fa-trash"></i>
                    </button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <a class="btn btn-secondary" routerLink="/manufacturing/production-plans">{{ 'Cancel' | abpLocalization }}</a>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || items.length === 0">
        <i class="fa fa-save me-1"></i>{{ 'Save' | abpLocalization }}
      </button>
    </div>
  </form>
</abp-page>
