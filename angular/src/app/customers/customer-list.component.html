<abp-page [title]="'Customers'">
  <div class="relative">
    @if (store.isLoading()) {
      <app-loading-overlay />
    }

    <mat-card>
      <mat-card-header class="flex items-center justify-between px-4 pt-4">
        <mat-card-title>{{ store.totalCount() }} Customers</mat-card-title>
        <button mat-flat-button color="primary" (click)="createCustomer()">
          <mat-icon>add</mat-icon>
          New Customer
        </button>
      </mat-card-header>

      <mat-card-content class="pt-4">
        @if (!store.hasCustomers()) {
          <p class="text-center text-gray-500 py-8">
            No customers yet. Click "New Customer" to add one.
          </p>
        } @else {
          <table mat-table [dataSource]="store.entities()" class="w-full">
            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef>Name</th>
              <td mat-cell *matCellDef="let customer">{{ customer.name }}</td>
            </ng-container>

            <ng-container matColumnDef="customerCode">
              <th mat-header-cell *matHeaderCellDef>Code</th>
              <td mat-cell *matCellDef="let customer">{{ customer.customerCode }}</td>
            </ng-container>

            <ng-container matColumnDef="tin">
              <th mat-header-cell *matHeaderCellDef>TIN</th>
              <td mat-cell *matCellDef="let customer">{{ customer.tin }}</td>
            </ng-container>

            <ng-container matColumnDef="phone">
              <th mat-header-cell *matHeaderCellDef>Phone</th>
              <td mat-cell *matCellDef="let customer">{{ customer.phone }}</td>
            </ng-container>

            <ng-container matColumnDef="email">
              <th mat-header-cell *matHeaderCellDef>Email</th>
              <td mat-cell *matCellDef="let customer">{{ customer.email }}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef></th>
              <td mat-cell *matCellDef="let customer">
                <button mat-icon-button [matMenuTriggerFor]="menu">
                  <mat-icon>more_vert</mat-icon>
                </button>
                <mat-menu #menu="matMenu">
                  <button mat-menu-item [routerLink]="[customer.id, 'edit']">
                    <mat-icon>edit</mat-icon> Edit
                  </button>
                  <button mat-menu-item (click)="delete(customer.id)">
                    <mat-icon>delete</mat-icon> Delete
                  </button>
                </mat-menu>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>

          <mat-paginator
            [length]="store.totalCount()"
            [pageSize]="20"
            [pageSizeOptions]="[10, 20, 50]"
            (page)="onPageChange($event)">
          </mat-paginator>
        }
      </mat-card-content>
    </mat-card>
  </div>
</abp-page>
