<abp-page [title]="'Stock Entry'">
  <form [formGroup]="form" (ngSubmit)="save()">
    <mat-card class="mb-6">
      <mat-card-content>
        <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
          <mat-form-field appearance="outline">
            <mat-label>Entry Type</mat-label>
            <mat-select formControlName="entryType">
              <mat-option value="Receipt">Material Receipt</mat-option>
              <mat-option value="Issue">Material Issue</mat-option>
              <mat-option value="Transfer">Material Transfer</mat-option>
              <mat-option value="Manufacture">Manufacture</mat-option>
            </mat-select>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Entry Date</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="entryDate" />
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Source Warehouse</mat-label>
            <input matInput formControlName="sourceWarehouse" placeholder="For transfer/issue" />
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Target Warehouse</mat-label>
            <input matInput formControlName="targetWarehouse" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="md:col-span-2">
            <mat-label>Remarks</mat-label>
            <input matInput formControlName="remarks" />
          </mat-form-field>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Items -->
    <mat-card class="mb-6">
      <mat-card-header><mat-card-title>Items</mat-card-title></mat-card-header>
      <mat-card-content class="pt-4">
        <table mat-table [dataSource]="items.controls" class="w-full">
          <ng-container matColumnDef="itemName">
            <th mat-header-cell *matHeaderCellDef>Item</th>
            <td mat-cell *matCellDef="let row" [formGroup]="row">
              <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
                <input matInput formControlName="itemName" placeholder="Item name" />
              </mat-form-field>
            </td>
          </ng-container>
          <ng-container matColumnDef="qty">
            <th mat-header-cell *matHeaderCellDef class="w-28">Qty</th>
            <td mat-cell *matCellDef="let row" [formGroup]="row">
              <mat-form-field appearance="outline" class="w-28" subscriptSizing="dynamic">
                <input matInput type="number" formControlName="qty" />
              </mat-form-field>
            </td>
          </ng-container>
          <ng-container matColumnDef="uom">
            <th mat-header-cell *matHeaderCellDef class="w-24">UoM</th>
            <td mat-cell *matCellDef="let row" [formGroup]="row">
              <mat-form-field appearance="outline" class="w-24" subscriptSizing="dynamic">
                <input matInput formControlName="uom" />
              </mat-form-field>
            </td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="w-12"></th>
            <td mat-cell *matCellDef="let row; let i = index">
              <button mat-icon-button color="warn" type="button" (click)="removeItem(i)">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
        <button mat-stroked-button class="mt-3" type="button" (click)="addItem()">
          <mat-icon>add</mat-icon> Add Item
        </button>
      </mat-card-content>
    </mat-card>

    <div class="flex gap-3 justify-end">
      <button mat-stroked-button type="button" (click)="cancel()">
        <mat-icon>close</mat-icon> Cancel
      </button>
      <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || items.length === 0">
        <mat-icon>save</mat-icon> Save
      </button>
    </div>
  </form>
</abp-page>
