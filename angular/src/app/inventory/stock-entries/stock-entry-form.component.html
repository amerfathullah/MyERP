<abp-page [title]="'Stock Entry'">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="fa fa-exchange-alt me-2"></i>Stock Entry</h5>
      </div>
      <div class="card-body">
        <div class="row">
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Entry Type</label>
            <select class="form-select" formControlName="entryType" [class.is-invalid]="form.get('entryType')?.invalid && form.get('entryType')?.touched">
              <option value="Receipt">Material Receipt</option>
              <option value="Issue">Material Issue</option>
              <option value="Transfer">Material Transfer</option>
              <option value="Manufacture">Manufacture</option>
            </select>
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Entry Date</label>
            <input type="date" class="form-control" formControlName="entryDate" [class.is-invalid]="form.get('entryDate')?.invalid && form.get('entryDate')?.touched" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Source Warehouse</label>
            <input type="text" class="form-control" formControlName="sourceWarehouse" [class.is-invalid]="form.get('sourceWarehouse')?.invalid && form.get('sourceWarehouse')?.touched" placeholder="For transfer/issue" />
          </div>
          <div class="col-12 col-md-4 mb-3">
            <label class="form-label">Target Warehouse</label>
            <input type="text" class="form-control" formControlName="targetWarehouse" [class.is-invalid]="form.get('targetWarehouse')?.invalid && form.get('targetWarehouse')?.touched" />
          </div>
          <div class="col-12 col-md-8 mb-3">
            <label class="form-label">Remarks</label>
            <input type="text" class="form-control" formControlName="remarks" [class.is-invalid]="form.get('remarks')?.invalid && form.get('remarks')?.touched" />
          </div>
        </div>
      </div>
    </div>

    <!-- Items -->
    <div class="card mb-4">
      <div class="card-header">
        <h5 class="card-title mb-0"><i class="fa fa-list me-2"></i>Items</h5>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-sm w-100">
            <thead>
              <tr>
                <th>Item</th>
                <th style="width: 110px">Qty</th>
                <th style="width: 100px">UoM</th>
                <th style="width: 50px"></th>
              </tr>
            </thead>
            <tbody>
              @for (row of items.controls; track $index; let i = $index) {
                <tr [formGroup]="$any(row)">
                  <td><input type="text" class="form-control form-control-sm" formControlName="itemName" placeholder="Item name" /></td>
                  <td><input type="number" class="form-control form-control-sm" formControlName="qty" /></td>
                  <td><input type="text" class="form-control form-control-sm" formControlName="uom" /></td>
                  <td>
                    <button type="button" class="btn btn-sm btn-outline-danger" (click)="removeItem(i)">
                      <i class="fa fa-trash"></i>
                    </button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
        <button type="button" class="btn btn-outline-secondary btn-sm mt-2" (click)="addItem()">
          <i class="fa fa-plus me-1"></i>{{ '::AddItem' | abpLocalization }}</button>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
        <i class="fa fa-times me-1"></i>Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || items.length === 0">
        <i class="fa fa-save me-1"></i>Save</button>
    </div>
  </form>
</abp-page>
