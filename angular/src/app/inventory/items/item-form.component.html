<abp-page [title]="isEditMode ? ('::EditItem' | abpLocalization) : ('::NewItem' | abpLocalization)">
  <div class="card mb-4">
    <div class="card-header">
      <h5 class="card-title mb-0"><i class="fa fa-box me-2"></i>{{ '::Item' | abpLocalization }}</h5>
    </div>
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="row">
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">{{ '::ItemCode' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="itemCode" [class.is-invalid]="form.get('itemCode')?.invalid && form.get('itemCode')?.touched" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">{{ '::ItemName' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="itemName" [class.is-invalid]="form.get('itemName')?.invalid && form.get('itemName')?.touched" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">{{ '::ItemType' | abpLocalization }}</label>
            <select class="form-select" formControlName="itemType" [class.is-invalid]="form.get('itemType')?.invalid && form.get('itemType')?.touched">
              @for (t of itemTypes; track t.value) {
                <option [value]="t.value">{{ t.label }}</option>
              }
            </select>
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">{{ '::ItemGroup' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="itemGroup" [class.is-invalid]="form.get('itemGroup')?.invalid && form.get('itemGroup')?.touched" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">{{ '::UOM' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="uom" [class.is-invalid]="form.get('uom')?.invalid && form.get('uom')?.touched" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">{{ '::Company' | abpLocalization }}</label>
            <input type="text" class="form-control" formControlName="companyId" [class.is-invalid]="form.get('companyId')?.invalid && form.get('companyId')?.touched" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">{{ '::SellingPrice' | abpLocalization }}</label>
            <input type="number" class="form-control" formControlName="standardSellingPrice" [class.is-invalid]="form.get('standardSellingPrice')?.invalid && form.get('standardSellingPrice')?.touched" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">{{ '::BuyingPrice' | abpLocalization }}</label>
            <input type="number" class="form-control" formControlName="standardBuyingPrice" [class.is-invalid]="form.get('standardBuyingPrice')?.invalid && form.get('standardBuyingPrice')?.touched" />
          </div>
          <div class="col-12 mb-3">
            <label class="form-label">{{ '::Description' | abpLocalization }}</label>
            <textarea class="form-control" formControlName="description" [class.is-invalid]="form.get('description')?.invalid && form.get('description')?.touched" rows="3"></textarea>
          </div>
          <div class="col-12 mb-3">
            <div class="d-flex gap-3">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" formControlName="maintainStock" id="maintainStock" />
                <label class="form-check-label" for="maintainStock">{{ '::MaintainStock' | abpLocalization }}</label>
              </div>
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" formControlName="isActive" id="isActive" />
                <label class="form-check-label" for="isActive">{{ '::Active' | abpLocalization }}</label>
              </div>
            </div>
          </div>
        </div>

        <div class="d-flex justify-content-end gap-2 pt-3">
          <button type="button" class="btn btn-outline-secondary" routerLink="/inventory/items"><i class="fa fa-times me-1"></i>{{ '::Cancel' | abpLocalization }}
          </button>
          <button type="submit" class="btn btn-primary">
            <i class="fa fa-save me-1"></i> {{ '::Save' | abpLocalization }}
          </button>
        </div>
      </form>
    </div>
  </div>
</abp-page>
