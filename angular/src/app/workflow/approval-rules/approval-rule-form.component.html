<abp-page [title]="'::NewRule' | abpLocalization">
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="card mb-4">
      <div class="card-body">
        <div class="row">
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">{{ '::Name' | abpLocalization }} <span class="text-danger">*</span></label>
            <input type="text" class="form-control" formControlName="name"
              [class.is-invalid]="form.get('name')?.invalid && form.get('name')?.touched" />
          </div>
          <div class="col-12 col-md-3 mb-3">
            <label class="form-label">{{ '::DocumentType' | abpLocalization }} <span class="text-danger">*</span></label>
            <select class="form-select" formControlName="documentType">
              @for (dt of documentTypes; track dt) {
                <option [value]="dt">{{ dt }}</option>
              }
            </select>
          </div>
          <div class="col-12 col-md-3 mb-3">
            <label class="form-label">{{ '::Level' | abpLocalization }} <span class="text-danger">*</span></label>
            <input type="number" class="form-control" formControlName="level" min="1" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">{{ '::Approver' | abpLocalization }} (Role)</label>
            <input type="text" class="form-control" formControlName="approverRoleName" placeholder="e.g., admin, manager" />
          </div>
          <div class="col-12 col-md-6 mb-3">
            <label class="form-label">{{ '::MinimumAmount' | abpLocalization }}</label>
            <input type="number" class="form-control" formControlName="minimumAmount" />
          </div>
          <div class="col-12 mb-3">
            <label class="form-label">{{ '::Description' | abpLocalization }}</label>
            <textarea class="form-control" formControlName="description" rows="2"></textarea>
          </div>
          <div class="col-12 mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" formControlName="isActive" id="isActive" />
              <label class="form-check-label" for="isActive">{{ '::Active' | abpLocalization }}</label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
        <i class="fa fa-times me-1"></i>{{ '::Cancel' | abpLocalization }}
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
        <i class="fa fa-save me-1"></i>{{ '::Save' | abpLocalization }}
      </button>
    </div>
  </form>
</abp-page>
