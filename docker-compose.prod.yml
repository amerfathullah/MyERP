# Production Docker Compose — MyERP
# Deploy with: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: myerp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-myerp}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-MyERP}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-myerp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    container_name: myerp-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  migrator:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-myerp}/myerp-migrator:${VERSION:-latest}
    container_name: myerp-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${DB_NAME:-MyERP};Username=${DB_USER:-myerp};Password=${DB_PASSWORD}"
    profiles:
      - migration

  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-myerp}/myerp-api:${VERSION:-latest}
    container_name: myerp-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${DB_NAME:-MyERP};Username=${DB_USER:-myerp};Password=${DB_PASSWORD}"
      Redis__Configuration: "redis:6379,password=${REDIS_PASSWORD}"
      App__SelfUrl: ${API_URL:-https://api.myerp.example.com}
      App__CorsOrigins: ${CORS_ORIGINS:-https://myerp.example.com}
      AuthServer__Authority: ${AUTH_AUTHORITY:-https://api.myerp.example.com}
      AuthServer__RequireHttpsMetadata: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${API_HOST:-api.myerp.example.com}`)"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=5000"

  angular:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-myerp}/myerp-angular:${VERSION:-latest}
    container_name: myerp-angular
    restart: unless-stopped
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.angular.rule=Host(`${APP_HOST:-myerp.example.com}`)"
      - "traefik.http.routers.angular.tls.certresolver=letsencrypt"
      - "traefik.http.services.angular.loadbalancer.server.port=80"

  traefik:
    image: traefik:v3
    container_name: myerp-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

volumes:
  pgdata:
  redisdata:
  letsencrypt:
