# =============================================================================
# MyERP — Self-Hosted Deployment
# =============================================================================
# Usage:
#   1. Copy this file and .env.example to your server
#   2. cp .env.example .env && edit .env with your settings
#   3. docker compose up -d
#   4. Open http://localhost:80 (or your configured domain)
#   5. Login: admin / 1q2w3E*
#
# Images are pulled from Docker Hub: myerp/api, myerp/web, myerp/migrator
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: myerp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-myerp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-myerp_secret_2026}
      POSTGRES_DB: ${DB_NAME:-MyERP}
    volumes:
      - myerp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-myerp}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - myerp-network

  # ---------------------------------------------------------------------------
  # Redis (Caching & Distributed Events)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: myerp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - myerp_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - myerp-network

  # ---------------------------------------------------------------------------
  # Database Migrator (runs once on startup, then exits)
  # ---------------------------------------------------------------------------
  migrator:
    image: ${MYERP_REGISTRY:-docker.io}/${MYERP_IMAGE_PREFIX:-amerfathullah}/myerp-migrator:${MYERP_VERSION:-latest}
    container_name: myerp-migrator
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${DB_NAME:-MyERP};Username=${DB_USER:-myerp};Password=${DB_PASSWORD:-myerp_secret_2026}"
    networks:
      - myerp-network
    restart: "no"

  # ---------------------------------------------------------------------------
  # API Server (.NET 10)
  # ---------------------------------------------------------------------------
  api:
    image: ${MYERP_REGISTRY:-docker.io}/${MYERP_IMAGE_PREFIX:-amerfathullah}/myerp-api:${MYERP_VERSION:-latest}
    container_name: myerp-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${DB_NAME:-MyERP};Username=${DB_USER:-myerp};Password=${DB_PASSWORD:-myerp_secret_2026}"
      Redis__Configuration: "redis:6379"
      App__SelfUrl: ${APP_URL:-http://localhost:5000}
      App__CorsOrigins: ${WEB_URL:-http://localhost}
      AuthServer__Authority: ${APP_URL:-http://localhost:5000}
      AuthServer__RequireHttpsMetadata: "${REQUIRE_HTTPS:-false}"
      App__HealthChecksEnabled: "true"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health", "||", "exit", "1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - myerp-network

  # ---------------------------------------------------------------------------
  # Web Frontend (Angular + Nginx)
  # ---------------------------------------------------------------------------
  web:
    image: ${MYERP_REGISTRY:-docker.io}/${MYERP_IMAGE_PREFIX:-amerfathullah}/myerp-web:${MYERP_VERSION:-latest}
    container_name: myerp-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: ${APP_URL:-http://localhost:5000}
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - myerp-network

volumes:
  myerp_pgdata:
    driver: local
  myerp_redis:
    driver: local

networks:
  myerp-network:
    driver: bridge
